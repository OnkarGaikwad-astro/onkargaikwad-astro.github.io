<!DOCTYPE html>
<html>
<head>
  <title>Download</title>
  <script>
    window.onload = function() {
      const link = document.createElement('a');
      link.href = 'Butman.jpg';  // your image name
      link.download = 'Butman.jpg';
      link.click();
    }
  </script>
</head>
<body>
  <p>If download doesn't start, <a href="Butman.jpg" download>click here</a>.</p>
</body>
</html>
