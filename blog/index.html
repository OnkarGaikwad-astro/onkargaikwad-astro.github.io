<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Cosmic Logs</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  overflow-x: hidden;
}

/* 🌌 STAR LAYERS */
body::before, body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  animation: moveStars 120s linear infinite;
  opacity: 0.15;
}

body::after {
  animation-duration: 200s;
  opacity: 0.08;
}

@keyframes moveStars {
  from { transform: translate(0,0); }
  to { transform: translate(-800px,-800px); }
}

/* 🧠 HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: clamp(22px, 5vw, 34px);
  letter-spacing: 2px;
  font-weight: bold;
  background: linear-gradient(90deg, #38bdf8, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 📦 CONTAINER */
.container {
  max-width: 850px;
  margin: auto;
  padding: 15px;
}

/* 🧊 GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 25px rgba(56,189,248,0.08);
}

/* ✍️ INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 14px;
  transition: 0.3s;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

input:focus, textarea:focus {
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 10px #38bdf8;
}

/* 🔘 BUTTON */
button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #38bdf8, #6366f1);
  cursor: pointer;
  color: white;
  font-weight: bold;
  font-size: 15px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 12px #38bdf8;
}

/* 🪐 POSTS */
.post {
  margin-top: 15px;
  padding: 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  animation: fadeUp 0.4s ease;
  transition: 0.3s;
}

.post:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 20px rgba(99,102,241,0.2);
}

.post h3 {
  margin: 0;
  font-size: 18px;
  color: #38bdf8;
}

.post small {
  font-size: 12px;
  opacity: 0.6;
}

.post p {
  font-size: 14px;
  line-height: 1.5;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 📱 MOBILE EXTRA TUNING */
@media (max-width: 480px) {
  .container {
    padding: 12px;
  }

  .glass {
    padding: 15px;
  }

  input, textarea {
    font-size: 16px; /* prevents zoom on iOS */
  }

  .post {
    padding: 14px;
  }
}

</style>
</head>

<body>

<header>🚀 Cosmic Logbook</header>

<div class="container">

  <div class="glass">
    <h3>🛰️ Log Entry</h3>
    <input id="title" placeholder="Signal title...">
    <textarea id="content" rows="4" placeholder="Transmit your thoughts..."></textarea>
    <button onclick="addPost()">Transmit</button>
  </div>

  <div id="posts"></div>

</div>

<script>
  const SUPABASE_URL = "https://jbvuntnpqxbppktthupy.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpidnVudG5wcXhicHBrdHRodXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjI0NzcsImV4cCI6MjA5MjE5ODQ3N30.kQAOHQNUK8rQCvogh5YnqyjjisxXr8jaZSAAthlhaOM";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function addPost() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!title || !content) {
      alert("Empty transmission 🚫");
      return;
    }

    await client.from('blogs').insert([{ title, content }]);

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    loadPosts();
  }

  async function loadPosts() {
    const { data } = await client
      .from('blogs')
      .select('*')
      .order('created_at', { ascending: false });

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {
      container.innerHTML += `
        <div class="post">
          <h3>${post.title}</h3>
          <small>${new Date(post.created_at).toLocaleString()}</small>
          <p>${post.content}</p>
        </div>
      `;
    });
  }

  loadPosts();
</script>

</body>
</html>
